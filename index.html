<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Stock Average Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Menu</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>
    <div class="main-content">
        <h1>Stock Average Calculator</h1>
        <div class="dark-mode-toggle">
            <label>
                <input type="checkbox" id="darkModeToggle">
                Dark Mode
            </label>
        </div>
        <div class="inputs">
            <label for="stockPrice">Stock Price:</label>
            <input type="number" id="stockPrice">
            <label for="numShares">Number of Shares:</label>
            <input type="number" id="numShares">
            <button id="calculateBtn">Calculate</button>
        </div>
        <div class="range-slider">
            <input type="range" min="1" max="100" value="50">
        </div>
        <div id="graph"></div>
        <div class="promotional-banner">
            <p>Visit our website for more features!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
